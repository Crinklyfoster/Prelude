name: prelude
services:
  postgres:
    image: postgres:17
    container_name: prelude-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    expose:
    - '5432'
    volumes:
    - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
      - CMD-SHELL
      - pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    logging: &id001
      driver: json-file
      options:
        max-size: 10m
        max-file: '3'
  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    image: prelude-backend
    container_name: prelude-backend
    env_file:
    - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      GROQ_API_KEY: ${GROQ_API_KEY}
      SECRET_KEY: ${SECRET_KEY}
    volumes:
    - chroma_data:/app/chroma_db
    - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
      - CMD
      - curl
      - -f
      - http://localhost:8000/health
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped
    logging: *id001
  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    image: prelude-frontend
    container_name: prelude-frontend
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test:
      - CMD
      - wget
      - --spider
      - http://localhost:3000
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped
    logging: *id001
    read_only: true
    tmpfs:
    - /tmp
  prometheus:
    image: prom/prometheus:latest
    container_name: prelude-prometheus
    expose:
    - '9090'
    volumes:
    - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    - prometheus_data:/prometheus
    depends_on:
    - backend
    healthcheck:
      test:
      - CMD
      - wget
      - --spider
      - http://localhost:9090/-/healthy
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    logging: *id001
  grafana:
    image: grafana/grafana:latest
    container_name: prelude-grafana
    expose:
    - '3000'
    volumes:
    - grafana_data:/var/lib/grafana
    - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
    - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards
    depends_on:
    - prometheus
    healthcheck:
      test:
      - CMD
      - wget
      - --spider
      - http://localhost:3000/api/health
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
    logging: *id001
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter
    container_name: prelude-postgres-exporter
    environment:
      DATA_SOURCE_NAME: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    logging: *id001
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: prelude-cadvisor
    privileged: true
    expose:
    - '8080'
    volumes:
    - /:/rootfs:ro
    - /var/run:/var/run:ro
    - /sys:/sys:ro
    - /var/lib/docker/:/var/lib/docker:ro
    restart: unless-stopped
    logging: *id001
  nginx:
    build:
      context: .
      dockerfile: docker/nginx.Dockerfile
    image: prelude-nginx
    container_name: prelude-nginx
    ports:
    - 80:8080
    depends_on:
    - frontend
    - backend
    - grafana
    - prometheus
    healthcheck:
      test:
      - CMD
      - wget
      - --spider
      - http://localhost
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped
    logging: *id001
    read_only: true
    tmpfs:
    - /var/cache/nginx
    - /var/run
    - /tmp
    cap_drop:
    - ALL
  loki:
    image: grafana/loki:2.9.8
    container_name: prelude-loki
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
    - ./monitoring/loki:/etc/loki
    restart: unless-stopped
    logging: *id001
  promtail:
    image: grafana/promtail:2.9.8
    container_name: prelude-promtail
    volumes:
    - ./monitoring/promtail:/etc/promtail
    - /var/log:/var/log
    - /var/lib/docker/containers:/var/lib/docker/containers:ro
    - /var/run/docker.sock:/var/run/docker.sock
    command:
    - -config.file=/etc/promtail/promtail.yaml
    depends_on:
    - loki
    restart: unless-stopped
    logging: *id001
volumes:
  postgres_data: null
  grafana_data: null
  prometheus_data: null
  chroma_data: null
  uploads_data: null
x-logging: *id001
